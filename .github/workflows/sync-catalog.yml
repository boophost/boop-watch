name: Sync catalog (prod → staging)

# Prod is the management source of truth (shows are added on watch.boopurno.es),
# but staging is the executor that sources + imports into the shared Jellyfin
# library. Separate DBs, so a prod-added show never reaches staging on its own.
# This periodically copies prod-only catalog entries into staging so its flows
# pick them up. One-way, additive (see scripts/sync-catalog.mjs). Runs on the
# in-cluster self-hosted runner (reaches the Service ClusterIPs + reads the JWT
# secrets); no external exposure.

on:
  schedule:
    - cron: '*/20 * * * *' # every 20 min
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (no writes)'
        type: boolean
        default: false

concurrency:
  group: sync-catalog
  cancel-in-progress: true

jobs:
  sync:
    if: github.repository == 'boophost/boop-watch'
    runs-on: [self-hosted, k3s-cp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync prod catalog into staging
        run: |
          export KUBECONFIG="$HOME/.kube/boop-watch-deployer.yaml"
          export PROD_JWT_SECRET="$(kubectl -n link-apps get secret boop-watch-secret -o jsonpath='{.data.JWT_SECRET}' | base64 -d)"
          export STAGING_JWT_SECRET="$(kubectl -n link-apps get secret boop-watch-dev-secret -o jsonpath='{.data.JWT_SECRET}' | base64 -d)"
          # Defaults hit the in-cluster Service DNS (boop-watch / boop-watch-dev).
          node scripts/sync-catalog.mjs ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
