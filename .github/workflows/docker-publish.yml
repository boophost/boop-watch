name: Build and Publish

# Build the image on every PR (validation, no push). On pushes to main, build and
# push ghcr.io/n0es/boop-watch:latest, then roll the k3s Deployment so the new
# image actually rolls out (see the `deploy` job — the old Watchtower flow is gone).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4



      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we actually push (main / manual), not on PRs.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll the k3s Deployment after a real push so the freshly pushed :latest is
  # actually pulled. The `link` platform sets imagePullPolicy: Always, but a
  # running pod never re-pulls a moved tag on its own — `rollout restart` bumps
  # the pod template (like link's own redeploy) and the new pod pulls :latest.
  # Runs on a self-hosted runner inside the cluster because the k3s API is
  # LAN-only; the runner uses a token scoped to patching link-apps deployments.
  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, k3s-cp]
    steps:
      - name: Roll boop-watch deployment
        env:
          KUBECONFIG: $HOME/.kube/boop-watch-deployer.yaml
        run: |
          kubectl -n link-apps rollout restart deployment/boop-watch
          kubectl -n link-apps rollout status deployment/boop-watch --timeout=180s
