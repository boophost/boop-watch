name: Build and Publish

# Build the image on every PR (validation, no push). On pushes to main or dev, build
# and push the image with a moving tag (main -> ghcr.io/boophost/boop-watch:latest,
# dev -> :dev; plus a per-commit sha tag), then roll the matching k3s Deployment so the
# new image rolls out: main -> `deploy` (boop-watch, prod), dev -> `deploy-dev`
# (boop-watch-dev, staging). Each deploy job re-pins the Deployment to the correct
# image (`kubectl set image`) before `rollout restart` re-pulls the moving tag, so the
# ref stays correct even if link's stored app config drifts (e.g. after the org move
# from n0es -> boophost). The old Watchtower flow is gone.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    # `closed` is needed to tear preview envs down; build is gated off it below.
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# Keyed on the event too, so a PR run and the push run for the same ref never
# share a group. They used to: merging #184 landed a `push` to dev and a
# `pull_request` run on the same ref, and cancel-in-progress killed the *push*
# run — the only one that carries deploy-dev — so the merge silently never
# reached staging. Branch pushes are also never cancelled: a superseded deploy
# is worse than a redundant one.
concurrency:
  group: build-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Skip on PR `closed` (nothing to build — the preview-down job handles it).
    if: github.repository == 'boophost/boop-watch' && github.event.action != 'closed' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Immutable content digest of the pushed image — the deploy jobs roll to
      # this exact digest so the pod can never come up on a stale/cached :dev.
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4



      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Always authenticate: PR builds don't push the image, but they pull the
      # registry-backed build cache from GHCR (:buildcache).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=
            # pr-<N> for dev-targeted PRs — the preview env pulls it by digest.
            type=ref,event=pr,enable=${{ github.base_ref == 'dev' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push on branch builds, and on dev-targeted PRs (the preview env needs
          # a real, pullable image). main-targeted PRs stay push-free (validation).
          push: ${{ github.event_name != 'pull_request' || github.base_ref == 'dev' }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-backed cache: the GHA cache service silently drops the big
          # node_modules layers (10 GB cap + large-blob upload flakiness), so
          # npm ci re-ran on every build. GHCR has no such limit. Only push the
          # cache from branch builds; PRs pull it read-only.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

  # Roll the k3s Deployment after a real push. We `set image` to the build's
  # immutable content digest (…@sha256:…), not the moving :latest/:dev tag — a
  # digest is unique per build and never cached, so `set image` reliably rolls a
  # new pod that pulls exactly the image we just built (no stale-tag race, and no
  # separate `rollout restart` needed since the pod template changes). Runs on a
  # self-hosted runner inside the cluster (the k3s API is LAN-only); the runner
  # uses a token scoped to patching link-apps deployments.
  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, k3s-cp]
    steps:
      - name: Roll boop-watch deployment
        run: |
          export KUBECONFIG="$HOME/.kube/boop-watch-deployer.yaml"
          kubectl -n link-apps set image deployment/boop-watch boop-watch=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}
          kubectl -n link-apps rollout status deployment/boop-watch --timeout=180s

  deploy-dev:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/dev'
    runs-on: [self-hosted, k3s-cp]
    steps:
      - name: Roll boop-watch-dev deployment
        run: |
          export KUBECONFIG="$HOME/.kube/boop-watch-deployer.yaml"
          kubectl -n link-apps set image deployment/boop-watch-dev boop-watch-dev=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}
          kubectl -n link-apps rollout status deployment/boop-watch-dev --timeout=180s

  gate:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      bump: ${{ steps.gate.outputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Gate auto-QA (version bump)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin ${{ github.base_ref }}
          bump=$(node scripts/qa-agent/version-bump.mjs "origin/${{ github.base_ref }}")
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          if [[ "$bump" == "patch" || "$bump" == "none" ]]; then
            gh pr comment ${{ github.event.pull_request.number }} -b "<!-- qa-agent -->
            ### 🤖 Auto-QA skipped
            
            Auto-QA skipped (patch/no minor bump). Unchecked test-plan items stay on the promotion PR — mark that PR **Ready for review** to catch up before prod."
          fi

  # Per-PR preview environment: an isolated clone of boop-watch-dev (own DB
  # seeded from dev, flow sink disabled) at pr-<N>-watch.boopurno.es. Provisioned
  # on every dev-targeted PR (open/sync), torn down on close (preview-down).
  # Requires the deployer kubeconfig's RBAC to allow create/delete of
  # Deployments/Services/PVCs/IngressRoutes + pods/exec for boop-watch-pr-* in
  # link-apps (see boophost/boop-watch-ops).
  preview-up:
    needs: [build, gate]
    if: github.event_name == 'pull_request' && github.base_ref == 'dev' && github.event.action != 'closed' && (needs.gate.outputs.bump == 'minor' || needs.gate.outputs.bump == 'major')
    runs-on: [self-hosted, k3s-cp]
    permissions:
      contents: read
      pull-requests: write
    outputs:
      url: ${{ steps.preview.outputs.url }}
      internal_url: ${{ steps.preview.outputs.internal_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Provision preview environment
        id: preview
        env:
          # The script's own default is 5. With ten PRs open at once that cap turned
          # into a silent QA outage: preview-up failed in 9s on every PR past the
          # fifth, and its qa-agent job was skipped — so half the board looked
          # "unverified" for a reason that had nothing to do with the code. Raise it
          # via a repo variable so the ceiling can move without a code change.
          MAX_PREVIEWS: ${{ vars.MAX_PREVIEWS || '10' }}
        run: |
          set -o pipefail
          export KUBECONFIG="$HOME/.kube/boop-watch-deployer.yaml"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          node scripts/preview-env.mjs up "${{ github.event.pull_request.number }}" "$IMAGE" | tee preview.log
          url=$(grep '^PREVIEW_URL=' preview.log | tail -1 | cut -d= -f2-)
          internal=$(grep '^PREVIEW_INTERNAL_URL=' preview.log | tail -1 | cut -d= -f2-)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "internal_url=$internal" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-env -->'
            const url = ${{ toJSON(steps.preview.outputs.url) }}
            const body = `${marker}\n### 🔎 Preview environment\n\n**URL:** ${url}\n\nIsolated per-PR clone of staging (own DB seeded from dev, flow sink disabled). Torn down when this PR closes. The QA agent verifies the test plan here.`
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
            const existing = comments.find((c) => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

  # Autonomous QA: drive the PR's `## Test plan` against its preview env, tick off
  # verified items on the PR, and comment evidence. Never merges or promotes. The
  # ticks propagate into the dev→main promotion PR (update-promotion-pr.mjs seeds
  # a checked promotion box from a `[x]` feature-PR line).
  qa-agent:
    needs: [preview-up, gate]
    if: github.event_name == 'pull_request' && github.base_ref == 'dev' && github.event.action != 'closed' && (needs.gate.outputs.bump == 'minor' || needs.gate.outputs.bump == 'major')
    runs-on: [self-hosted, k3s-cp]
    permissions:
      contents: read
      pull-requests: write
      actions: write   # dispatch the promotion-PR refresh at the end of QA
    env:
      # Internal ClusterIP URL — bypasses the CF-proxied public host (https→404,
      # http→301). Falls back to the public host if internal wasn't emitted.
      BASE_URL: ${{ needs.preview-up.outputs.internal_url || needs.preview-up.outputs.url }}
      GITHUB_TOKEN: ${{ github.token }}
      # Subscription/session auth (from `claude setup-token`) — NOT per-token API
      # billing. Set CLAUDE_CODE_OAUTH_TOKEN_2/_3 to pool extra accounts: when one
      # hits its usage cap the agent rotates to the next. ANTHROPIC_API_KEY (if
      # set) is tried last. Unset secrets come through empty and are skipped.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
      CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Give the agent a real browser so it can verify UI items instead of
      # skipping them (the portal and /manage are client-rendered SPAs — an API
      # call can't prove a menu opens or a dialog saves).
      QA_PLAYWRIGHT: '1'
      # run.mjs defaults to 8 minutes, which only fits a curl-and-look test plan. An
      # item that restarts the preview pod to prove a failure path (kill Jellyfin to
      # force the player's stall overlay; raise WORK_MIN_GIB to trip the scratch
      # guard) spends minutes just waiting on rollouts, and the agent was killed
      # mid-run with nothing ticked. Give a plan room to actually be driven.
      QA_TIMEOUT_MS: ${{ vars.QA_TIMEOUT_MS || '1500000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check cooldown
        id: cooldown
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          node -e "
            import { filterCredentials, getEarliestReset, credentialPool } from './scripts/qa-agent/cooldown.mjs'
            const creds = credentialPool()
            if (creds.length > 0 && filterCredentials(creds).length === 0) {
              const earliest = getEarliestReset(creds) || 'unknown'
              console.log('All credentials cooling down until ' + earliest)
              const fs = await import('node:fs')
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'cooling=true\nearliest=' + earliest + '\n')
            }
          "
          if grep -q "cooling=true" "$GITHUB_OUTPUT"; then
            earliest=$(grep "earliest=" "$GITHUB_OUTPUT" | cut -d= -f2)
            # Self-hosted runner has no `gh` — post via the REST API.
            body=$(node -e 'const e=process.argv[1]; console.log(JSON.stringify({body:`<!-- qa-agent -->\n### 🤖 QA agent — paused\n\nQA paused — all credentials rate limited until ${e} (UTC).`}))' "$earliest")
            curl -fsS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "$body" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              >/dev/null
          fi
      - name: Debounce
        id: debounce
        if: steps.cooldown.outputs.cooling != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          # Cap on how long we'll wait for a quiet tip (default 3 min).
          QA_DEBOUNCE_MS: ${{ vars.QA_DEBOUNCE_MS }}
          # Tip must stay unchanged this long before QA starts (default 30s).
          QA_DEBOUNCE_QUIET_MS: ${{ vars.QA_DEBOUNCE_QUIET_MS }}
          # How often to re-check the PR head (default 15s).
          QA_DEBOUNCE_POLL_MS: ${{ vars.QA_DEBOUNCE_POLL_MS }}
        run: |
          # Quiet-period debounce (no static full sleep, no `gh` CLI):
          # poll PR head.sha until it's been equal to this run's trigger tip for
          # QUIET_MS, or until MAX_MS elapses. If head moves off the trigger tip,
          # this run is superseded (the newer workflow will QA).
          #
          # Compare against pull_request.head.sha — NOT github.sha (that's the
          # ephemeral merge commit on pull_request events and would always "differ").
          set -euo pipefail
          TRIGGER_SHA='${{ github.event.pull_request.head.sha }}'
          MAX_MS="${QA_DEBOUNCE_MS:-180000}"
          QUIET_MS="${QA_DEBOUNCE_QUIET_MS:-30000}"
          POLL_MS="${QA_DEBOUNCE_POLL_MS:-15000}"
          REPO='${{ github.repository }}'
          PR='${{ github.event.pull_request.number }}'
          START_MS=$(($(date +%s%3N)))
          QUIET_SINCE_MS="$START_MS"

          head_sha() {
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/pulls/${PR}" \
              | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const s=JSON.parse(d).head?.sha; if(!s) process.exit(2); process.stdout.write(s)})"
          }

          echo "Debounce: trigger=${TRIGGER_SHA:0:7} quiet=${QUIET_MS}ms poll=${POLL_MS}ms cap=${MAX_MS}ms"
          while true; do
            NOW_MS=$(($(date +%s%3N)))
            ELAPSED=$((NOW_MS - START_MS))
            CURRENT="$(head_sha)"
            if [ "$CURRENT" != "$TRIGGER_SHA" ]; then
              echo "Debounced — head moved ${TRIGGER_SHA:0:7} → ${CURRENT:0:7}; newer run will QA."
              echo "superseded=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            STABLE_FOR=$((NOW_MS - QUIET_SINCE_MS))
            if [ "$STABLE_FOR" -ge "$QUIET_MS" ]; then
              echo "Tip quiet for ${STABLE_FOR}ms — proceeding with QA."
              exit 0
            fi
            if [ "$ELAPSED" -ge "$MAX_MS" ]; then
              echo "Hit debounce cap (${ELAPSED}ms) still on ${TRIGGER_SHA:0:7} — proceeding."
              exit 0
            fi
            REMAIN_QUIET=$((QUIET_MS - STABLE_FOR))
            REMAIN_CAP=$((MAX_MS - ELAPSED))
            SLEEP_MS="$POLL_MS"
            if [ "$REMAIN_QUIET" -lt "$SLEEP_MS" ]; then SLEEP_MS="$REMAIN_QUIET"; fi
            if [ "$REMAIN_CAP" -lt "$SLEEP_MS" ]; then SLEEP_MS="$REMAIN_CAP"; fi
            if [ "$SLEEP_MS" -lt 1 ]; then SLEEP_MS=1; fi
            echo "Tip ${CURRENT:0:7} stable ${STABLE_FOR}ms — sleeping ${SLEEP_MS}ms…"
            # bash sleep wants seconds; allow sub-second via node when needed.
            node -e "setTimeout(()=>{}, Number(process.argv[1]))" "$SLEEP_MS"
          done
      - name: Install Claude CLI
        if: steps.cooldown.outputs.cooling != 'true' && steps.debounce.outputs.superseded != 'true'
        env:
          DISABLE_AUTOUPDATER: '1'
          DISABLE_TELEMETRY: '1'
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
        run: |
          # Native install (fetches the platform binary up front) rather than the
          # npm wrapper's lazy first-run download. NB: the binary is Bun-compiled
          # and needs an AVX-capable CPU — the runner VM must expose `host` CPU.
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          timeout 60 claude --version || { echo "::error::claude CLI won't start (AVX-less CPU? see k8s-cp cpu=host)"; exit 1; }
      # Chromium for the Playwright MCP. Idempotent: after the first run the
      # browser is cached in ~/.cache/ms-playwright and this is a no-op. System
      # libs need root, but the *browser* must land in the runner user's cache —
      # installing the browser under sudo would put it in /root and the agent
      # (running as the runner user) would never find it.
      - name: Ensure Chromium for Playwright
        if: steps.cooldown.outputs.cooling != 'true' && steps.debounce.outputs.superseded != 'true'
        run: |
          # Install the browser with the MCP's OWN bundled Playwright. Using
          # `playwright@latest` instead installs a different chromium revision
          # than the MCP expects (it pins a newer alpha), and the MCP then fails
          # with "Chrome binary missing" — QA silently loses the browser.
          # System libs need root; the browser must land in the runner user's
          # cache (a sudo install would hide it in /root).
          sudo -n env "PATH=$PATH" npx --yes --package=@playwright/mcp@latest -- playwright install-deps chromium
          npx --yes --package=@playwright/mcp@latest -- playwright install chromium
      # Prove the agent can actually drive a browser before we trust any UI
      # verdict. A silently-broken MCP used to make it "verify" UI items with
      # curl — for a client-rendered SPA that's a false pass. This reads the real
      # tool_use blocks and fails if no browser tool was called.
      - name: Verify the QA browser really works
        if: steps.cooldown.outputs.cooling != 'true' && steps.debounce.outputs.superseded != 'true'
        run: node scripts/qa-agent/verify-browser.mjs
      - name: Run QA agent
        if: steps.cooldown.outputs.cooling != 'true' && steps.debounce.outputs.superseded != 'true'
        run: |
          export KUBECONFIG="$HOME/.kube/boop-watch-deployer.yaml"
          export JWT_SECRET="$(kubectl -n link-apps get secret boop-watch-dev-secret -o jsonpath='{.data.JWT_SECRET}' | base64 -d)"
          node scripts/qa-agent/run.mjs "${{ github.event.pull_request.number }}"

  preview-down:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev' && github.event.action == 'closed'
    runs-on: [self-hosted, k3s-cp]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Tear down preview environment
        run: |
          export KUBECONFIG="$HOME/.kube/boop-watch-deployer.yaml"
          node scripts/preview-env.mjs down "${{ github.event.pull_request.number }}"
